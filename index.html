<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포켓몬 얼굴 프로필 생성기</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">얼굴 사진 기반 포켓몬 프로필 생성기</p>
        <h1>포켓몬 얼굴 프로필 생성기</h1>
        <p class="hero-copy">
          얼굴 사진을 올리면 얼굴 특징을 분석해 타입, 특성, 종족값,
          도감 설명, 기술을 한 번에 생성한다.
        </p>
      </header>

      <main class="layout">
        <section class="panel controls-panel">
          <div class="panel-header">
            <h2>1. 얼굴 사진 업로드</h2>
          </div>

          <label class="upload-zone" for="imageInput">
            <input id="imageInput" type="file" accept="image/*" />
            <span class="upload-title">이미지 선택</span>
            <span class="upload-subtitle">
              정면에 가깝고 얼굴이 잘 보이는 사진일수록 분석 정확도가 높다.
            </span>
          </label>

          <div class="preview-wrap">
            <img id="previewImage" alt="업로드한 이미지 미리보기" hidden />
            <canvas id="overlayCanvas" hidden></canvas>
            <div id="emptyPreview" class="empty-preview">여기에 이미지 미리보기가 표시된다.</div>
          </div>

          <div class="actions actions--single">
            <button id="analyzeButton" class="primary-btn" disabled>얼굴 분석하기</button>
          </div>

          <div id="statusMessage" class="status-message">
            이미지를 올리면 분석을 시작할 수 있다.
          </div>
        </section>

        <section class="panel result-panel">
          <div class="panel-header">
            <h2>2. 생성 결과</h2>
            <span id="modelStatus" class="badge muted">모델 준비 전</span>
          </div>

          <div id="resultPlaceholder" class="result-placeholder" hidden></div>

          <div id="resultContent" class="result-content" hidden>
            <section class="monster-card">
              <div class="monster-card__header">
                <div class="bst-wrap bst-wrap--left">
                  <p class="label">종족값 합계</p>
                  <p id="bstValue" class="bst-value">000</p>
                </div>
              </div>

              <div class="type-row">
                <div>
                  <p class="label">타입</p>
                  <div id="typeBadges" class="type-badges"></div>
                </div>
                <div>
                  <p class="label">특성</p>
                  <div id="abilityBox" class="ability-box"></div>
                </div>
              </div>

              <div>
                <p class="label">도감 설명</p>
                <p id="dexEntry" class="dex-entry">—</p>
              </div>
            </section>

            <section class="insight-grid insight-grid--single">
              <div class="sub-panel">
                <h4>선정 이유</h4>
                <ul id="reasonList" class="reason-list"></ul>
              </div>
            </section>

            <section class="sub-panel">
              <div class="sub-panel__header">
                <h4>종족값</h4>
                <p id="archetypeText" class="subtle">—</p>
              </div>
              <div id="statRows" class="stats"></div>
            </section>

            <section class="sub-panel">
              <div class="sub-panel__header">
                <h4>배울 수 있는 기술</h4>
              </div>
              <div id="moveChips" class="chips"></div>
            </section>

            <section class="sub-panel">
              <div class="sub-panel__header">
                <h4>얼굴 분석 지표</h4>
                <p class="subtle">얼굴 형태와 표정 수치를 바탕으로 계산한 값이다</p>
              </div>
              <div id="metricGrid" class="metric-grid"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
